name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish Single-File Application
      run: >-
        dotnet publish src/ScreenMind.App/ScreenMind.App.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:PublishReadyToRun=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:DebugType=None
        -p:DebugSymbols=false
        -o artifacts/ScreenMind-win-x64

    - name: Verify Single-File Output
      shell: pwsh
      run: |
        $publishDir = "artifacts/ScreenMind-win-x64"
        $exe = Join-Path $publishDir "SystemServiceHost.exe"
        if (-not (Test-Path $exe)) { throw "Expected executable was not produced: $exe" }
        $files = @(Get-ChildItem -Path $publishDir -File)
        if ($files.Count -ne 1 -or $files[0].Name -ne "SystemServiceHost.exe") {
          $files | Format-Table Name, Length
          throw "Publish output is not a single EXE file."
        }
        if ($files[0].Length -le 0) { throw "The published EXE is empty." }

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/ScreenMind-win-x64/SystemServiceHost.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
